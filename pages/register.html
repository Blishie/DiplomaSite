<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Интернет-магазин</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 15px;
            text-align: center;
        }

        .auth-description {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4a90e2;
            box-shadow: 0 0 0 2px rgba(74, 144, 226, 0.2);
        }

        .form-group i {
            position: absolute;
            left: 12px;
            top: 36px;
            color: #666;
            font-size: 16px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            user-select: none;
            font-size: 14px;
            color: #666;
        }

        .checkbox-label input[type="checkbox"] {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .checkbox-label a {
            color: #4a90e2;
            text-decoration: none;
            margin-left: 4px;
        }

        .checkbox-label a:hover {
            text-decoration: underline;
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #357abd;
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.2);
        }

        .auth-links {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .auth-links a {
            color: #4a90e2;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .auth-links a:hover {
            color: #357abd;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .auth-container {
                padding: 20px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <h1>Регистрация</h1>
        <p class="auth-description">Создайте аккаунт для доступа ко всем возможностям магазина</p>
        
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label for="name">Имя</label>
                <i class="fas fa-user"></i>
                <input type="text" id="name" name="name" required placeholder="Введите ваше имя">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" name="email" required placeholder="Введите ваш email">
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="password" name="password" required placeholder="Придумайте пароль">
            </div>

            <div class="form-group">
                <label for="password-confirm">Подтверждение пароля</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="password-confirm" name="password-confirm" required placeholder="Повторите пароль">
            </div>

            <label class="checkbox-label">
                <input type="checkbox" name="terms" required>
                Я согласен с <a href="../terms.html">условиями использования</a>
            </label>

            <button type="submit" class="btn-primary">Зарегистрироваться</button>
        </form>
        
        <div class="auth-links">
            <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
        </div>
    </div>

    <script src="../js/auth.js"></script>
</body>
</html>
